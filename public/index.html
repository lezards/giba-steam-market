<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Giba Steam Market</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#121724; --panel2:#1a2133; --line:#232c44;
    --txt:#e8ecf6; --dim:#9aa7c7; --gold:#f6c945; --orange:#ff8a3d;
    --green:#4ade80; --blue:#60a5fa; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:15px/1.5 'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0e1320 0%,#0b0e14ee 100%);border-bottom:1px solid var(--line);padding:14px 22px;backdrop-filter:blur(8px)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  h1{font-size:19px;letter-spacing:.4px;background:linear-gradient(90deg,var(--orange),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  select,input,button{font:inherit;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:9px 13px;outline:none}
  select:focus,input:focus{border-color:var(--gold)}
  #search{flex:1;min-width:240px;font-size:16px}
  button{cursor:pointer;transition:.15s}
  button:hover{border-color:var(--gold);background:#222b45}
  button:disabled{opacity:.45;cursor:wait}
  .meta{color:var(--dim);font-size:13.5px}
  main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:18px 22px}
  table{width:100%;border-collapse:collapse}
  th{position:sticky;top:64px;background:var(--panel);text-align:left;padding:10px 12px;font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  th:hover{color:var(--gold)}
  td{padding:9px 12px;border-bottom:1px solid #161d30;vertical-align:middle}
  tr.item:hover{background:#141b2d}
  .rk{color:var(--dim);width:48px;font-size:13.5px}
  .ic{width:44px;height:44px;border-radius:8px;background:#0d1220;object-fit:contain}
  .nm{font-weight:600}
  .nm a{color:inherit;text-decoration:none}
  .nm a:hover{color:var(--gold)}
  .tp{font-size:13px;color:var(--dim)}
  .pr{font-weight:700;color:var(--green);white-space:nowrap;font-size:15.5px}
  .ls{color:var(--dim);white-space:nowrap}
  .brl{font-size:13.5px;padding:6px 11px}
  .brlv{color:var(--gold);font-weight:600;white-space:nowrap;font-size:14px}
  #status{padding:30px;text-align:center;color:var(--dim)}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-4px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  footer{border-top:1px solid var(--line);padding:14px 22px;text-align:center;color:var(--dim);font-size:13.5px}
  footer a{color:var(--orange);text-decoration:none}
  footer a:hover{color:var(--gold)}
  /* Baú */
  #stash{background:linear-gradient(180deg,#141a2b,#101524);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden}
  #stashHead{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;user-select:none;flex-wrap:wrap}
  #stashHead h2{font-size:15px;color:var(--gold);letter-spacing:.4px}
  .tot{margin-left:auto;display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  .tot b{font-size:21px;color:var(--green)}
  .tot .brlt{font-size:15px;color:var(--gold)}
  .tot .split{font-size:12.5px;color:var(--dim);width:100%}
  .tot .split b{font-size:12.5px;color:var(--blue)}
  .tot small{color:var(--dim);font-size:12px}
  .srow .kind{font-size:14px;width:20px;text-align:center;opacity:.85}
  #stashBody{border-top:1px solid var(--line);max-height:340px;overflow:auto}
  .srow{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid #161d30}
  .srow:last-child{border:0}
  .srow img{width:34px;height:34px;border-radius:6px;background:#0d1220;object-fit:contain}
  .srow .sn{flex:1;min-width:0}
  .srow .sn b{font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .sn small{color:var(--dim);font-size:12px}
  .qty{display:flex;align-items:center;gap:4px}
  .qty button{padding:3px 9px;border-radius:6px;font-size:15px;line-height:1}
  .qty span{min-width:26px;text-align:center;font-weight:600}
  .sval{color:var(--green);font-weight:700;min-width:78px;text-align:right;white-space:nowrap}
  .srm{color:var(--dim);background:none;border:none;cursor:pointer;font-size:17px;padding:2px 6px}
  .srm:hover{color:#ff6b6b}
  .add{background:none;border:1px solid var(--line);border-radius:7px;color:var(--gold);cursor:pointer;padding:4px 9px;font-size:15px;line-height:1}
  .add:hover{background:#222b45;border-color:var(--gold)}
  .empty{padding:16px;color:var(--dim);text-align:center;font-size:14px}
  @media(max-width:640px){ .tp,.ls{display:none} th:nth-child(5),td:nth-child(5){display:none} }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>⚔ Giba Steam Market</h1>
    <select id="game">
      <option value="3678970" selected>TBH: Task Bar Hero</option>
      <option value="730">Counter-Strike 2</option>
      <option value="440">Team Fortress 2</option>
      <option value="570">Dota 2</option>
      <option value="252490">Rust</option>
      <option value="custom">Outro appid…</option>
    </select>
    <input id="search" type="search" placeholder="Buscar item… (ex: Divine, Gloves, Helmet)" autofocus>
    <button id="refresh" title="Atualizar do Mercado Steam">↻ Atualizar</button>
  </div>
  <div class="row" style="margin-top:8px">
    <span class="meta" id="info">carregando…</span>
  </div>
</header>
<main>
  <section id="stash" hidden>
    <div id="stashHead">
      <h2>🎒 Meu Baú</h2>
      <span class="meta" id="stashCount"></span>
      <div class="tot">
        <span><small>valor estimado</small> <b id="totUsd">$0.00</b></span>
        <span class="brlt" id="totBrl"></span>
        <span class="split" id="totSplit"></span>
      </div>
      <span id="stashToggle" class="meta">▼</span>
    </div>
    <div id="stashBody"></div>
  </section>
  <div id="status"><span class="spin"></span>Buscando itens no Mercado Steam…</div>
  <table id="tbl" hidden>
    <thead><tr>
      <th class="rk">#</th><th></th><th data-s="name">Item</th>
      <th data-s="price">Preço (USD) ▼</th><th data-s="listings">À venda</th><th>BRL</th><th></th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</main>
<footer>EuSouOGiba · <a href="https://youtube.com/@eusouogiba" target="_blank">youtube.com/@eusouogiba</a> · <a href="https://eusouogiba.com" target="_blank">eusouogiba.com</a></footer>
<script>
let all=[], appid=3678970, sortKey='price', sortDir=-1, cooldown=0;
const $=id=>document.getElementById(id);
const norm=s=>s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
const byHash=h=>all.find(i=>i.hash===h);

// ===== Meu Baú — AUTO via save do jogo (TBH), manual pra outros =====
let stashData=null;   // resposta de /api/stash (TBH)
let manual={};        // hash->qty (fallback manual / outros jogos)
const manKey=()=>`gsm_stash_${appid}`;
function loadStash(){ try{manual=JSON.parse(localStorage.getItem(manKey()))||{}}catch{manual={}} }
function saveStash(){ localStorage.setItem(manKey(),JSON.stringify(manual)); }
function setQty(h,q){ if(q<=0) delete manual[h]; else manual[h]=q; saveStash(); renderStash(); }
function addStash(h){ setQty(h,(manual[h]||0)+1); }

async function loadAutoStash(){
  stashData=null;
  try{
    const j=await(await fetch(`/api/stash?appid=${appid}`)).json();
    if(j.supported && j.found && j.items) stashData=j;
  }catch{}
  renderStash();
}

function renderStash(){
  const sec=$('stash'), body=$('stashBody'); sec.hidden=false;
  // modo AUTO (save lido): usa stashData
  if(stashData){
    const it=stashData.items;
    body.innerHTML = it.length ? it.map(r=>{
      const tot=r.priceCents*r.qty;
      const ki=r.kind==='material'?'🔩':'⚔️';
      return `<div class="srow">
        <span class="kind" title="${r.kind==='material'?'material':'equipamento'}">${ki}</span>
        ${r.icon?`<img loading="lazy" src="${r.icon}">`:'<div style="width:34px"></div>'}
        <div class="sn"><b ${r.color?`style="color:#${r.color}"`:''}>${r.name}</b><small>${r.type} · ${r.priceText} un.</small></div>
        <div class="qty" style="cursor:default"><span>×${r.qty}</span></div>
        <div class="sval">$${(tot/100).toFixed(2)}</div>
        <a class="srm" href="${r.url}" target="_blank" title="Abrir na Steam" style="text-decoration:none">↗</a></div>`;
    }).join('') : '<div class="empty">Baú lido, mas nenhum item vendável no momento.</div>';
    $('totUsd').textContent='$'+(stashData.totalCents/100).toFixed(2);
    if(stashData.gearCents!=null) $('totSplit').innerHTML=`⚔️ equipamentos <b>$${(stashData.gearCents/100).toFixed(2)}</b> &nbsp;·&nbsp; 🔩 materiais <b>$${(stashData.matCents/100).toFixed(2)}</b>`;
    const unp = stashData.unpricedItems ? ` · ${stashData.unpricedItems} sem mercado` : '';
    $('stashCount').textContent=`🔄 auto do save · ${stashData.types} tipos · ${stashData.pricedItems} itens com preço${unp}`;
    if(window._brlRate) $('totBrl').textContent='≈ R$ '+(stashData.totalCents/100*window._brlRate).toFixed(2).replace('.',',');
    return;
  }
  // modo MANUAL (outros jogos ou save não encontrado)
  $('totSplit').innerHTML='';
  const hashes=Object.keys(manual);
  if(!hashes.length){ body.innerHTML='<div class="empty">Baú vazio. Clique no ＋ de um item da lista pra calcular tua carteira manualmente.</div>'; $('totUsd').textContent='$0.00'; $('totBrl').textContent=''; $('stashCount').textContent=appid===3678970?'save do TBH não encontrado — modo manual':''; return; }
  let totC=0, known=0;
  const rows=hashes.map(h=>{const it=byHash(h),q=manual[h],c=it?it.priceCents:0; if(it){totC+=c*q;known++;} return {h,q,it,c};}).sort((a,b)=>(b.c*b.q)-(a.c*a.q));
  body.innerHTML=rows.map(r=>{
    const it=r.it,val=it?('$'+(r.c*r.q/100).toFixed(2)):'<small style="color:var(--dim)">sem preço</small>';
    return `<div class="srow" data-h="${encodeURIComponent(r.h)}">
      ${it&&it.icon?`<img loading="lazy" src="${it.icon}">`:'<div style="width:34px"></div>'}
      <div class="sn"><b ${it&&it.color?`style="color:#${it.color}"`:''}>${it?it.name:decodeURIComponent(r.h)}</b><small>${it?(it.priceText+' un.'):'item fora da lista'}</small></div>
      <div class="qty"><button data-a="dec">−</button><span>${r.q}</span><button data-a="inc">+</button></div>
      <div class="sval">${val}</div>
      <button class="srm" data-a="rm" title="Remover">✕</button></div>`;
  }).join('');
  $('totUsd').textContent='$'+(totC/100).toFixed(2);
  $('stashCount').textContent=`✏️ manual · ${hashes.length} tipos · ${hashes.reduce((s,h)=>s+manual[h],0)} itens`;
  if(window._brlRate) $('totBrl').textContent='≈ R$ '+(totC/100*window._brlRate).toFixed(2).replace('.',',');
}

$('stashBody').addEventListener('click',e=>{
  const b=e.target.closest('button[data-a]'); if(!b||stashData) return;
  const h=decodeURIComponent(e.target.closest('.srow').dataset.h);
  if(b.dataset.a==='inc') setQty(h,manual[h]+1);
  else if(b.dataset.a==='dec') setQty(h,manual[h]-1);
  else if(b.dataset.a==='rm') setQty(h,0);
});
$('stashHead').addEventListener('click',e=>{
  if(e.target.closest('button,a')) return;
  const body=$('stashBody'); const hide=body.style.display!=='none';
  body.style.display=hide?'none':''; $('stashToggle').textContent=hide?'▶':'▼';
});
// taxa USD→BRL a partir do item mais caro do baú (1 req)
async function refreshBrlRate(){
  const pool = stashData ? stashData.items : Object.keys(manual).map(byHash).filter(Boolean);
  const h = pool.slice().sort((a,b)=>b.priceCents-a.priceCents)[0];
  if(!h) return;
  try{ const j=await(await fetch(`/api/price?appid=${appid}&name=${encodeURIComponent(h.hash)}`)).json();
    const brl=parseFloat((j.brl||'').replace(/[^\d,]/g,'').replace(',','.'));
    if(brl>0){ window._brlRate=brl/(h.priceCents/100); renderStash(); } }catch{}
}

async function load(force){
  $('status').hidden=false; $('tbl').hidden=true;
  $('status').innerHTML='<span class="spin"></span>Buscando itens no Mercado Steam…'+(force?' (atualização completa, ~15s por causa do rate-limit gentil)':'');
  try{
    const r=await fetch(`/api/items?appid=${appid}${force?'&refresh=1':''}`);
    if(!r.ok) throw new Error((await r.json()).error||r.status);
    const j=await r.json();
    all=j.items||[];
    await loadAutoStash(); refreshBrlRate();
    const age=Math.round((Date.now()-j.fetchedAt)/60000);
    $('info').textContent=`${j.total} itens · atualizado ${age<1?'agora':age+' min atrás'}${j.stale?' · atualizando em background…':''} · fonte: Mercado da Comunidade Steam (público)`;
    render();
  }catch(e){ $('status').textContent='Erro: '+e.message+' — tenta Atualizar de novo em 1 min.'; }
}

function render(){
  const q=norm($('search').value.trim());
  let list=q?all.filter(i=>norm(i.name).includes(q)||norm(i.type).includes(q)):all.slice();
  list.sort((a,b)=>{
    if(sortKey==='name') return sortDir*a.name.localeCompare(b.name);
    if(sortKey==='listings') return sortDir*(a.listings-b.listings);
    return sortDir*(a.priceCents-b.priceCents);
  });
  const tb=$('rows'); tb.innerHTML='';
  const frag=document.createDocumentFragment();
  list.forEach((i,n)=>{
    const tr=document.createElement('tr'); tr.className='item';
    tr.innerHTML=`<td class="rk">${n+1}</td>
      <td>${i.icon?`<img class="ic" loading="lazy" src="${i.icon}" alt="">`:''}</td>
      <td><div class="nm" ${i.color?`style="color:#${i.color}"`:''}><a href="${i.url}" target="_blank" title="Abrir listing na Steam">${i.name}</a></div><div class="tp">${i.type}</div></td>
      <td class="pr">${i.priceText}</td>
      <td class="ls">${i.listings}</td>
      <td><button class="brl" data-n="${encodeURIComponent(i.hash)}">R$ ?</button></td>
      <td><button class="add" data-h="${encodeURIComponent(i.hash)}" title="Adicionar ao Meu Baú">＋</button></td>`;
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
  $('status').hidden=list.length>0; $('tbl').hidden=list.length===0;
  if(!list.length) $('status').textContent='Nenhum item bate com "'+$('search').value+'"';
}

$('rows').addEventListener('click',async e=>{
  const ad=e.target.closest('.add');
  if(ad){ addStash(decodeURIComponent(ad.dataset.h)); ad.textContent='✓'; setTimeout(()=>ad.textContent='＋',700); if(!window._brlRate)refreshBrlRate(); return; }
  const b=e.target.closest('.brl'); if(!b) return;
  b.disabled=true; b.textContent='…';
  try{
    const r=await fetch(`/api/price?appid=${appid}&name=${b.dataset.n}`);
    const j=await r.json();
    if(j.error) throw new Error(j.error);
    b.outerHTML=`<span class="brlv">${j.brl||'—'}${j.volume?`<br><small style="color:var(--dim)">${j.volume}/dia</small>`:''}</span>`;
  }catch(err){ b.disabled=false; b.textContent='R$ ?'; b.title=err.message; }
});

let t; $('search').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(render,120)});
document.querySelectorAll('th[data-s]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.s; sortDir=(k===sortKey)?-sortDir:(k==='name'?1:-1); sortKey=k;
  document.querySelectorAll('th[data-s]').forEach(x=>x.textContent=x.textContent.replace(/ [▼▲]/,''));
  th.textContent+=sortDir<0?' ▼':' ▲'; render();
}));
$('game').addEventListener('change',e=>{
  let v=e.target.value;
  if(v==='custom'){ v=prompt('AppID do jogo (numérico):',''); if(!v||!/^\d+$/.test(v)){e.target.value=appid;return;}
    const o=document.createElement('option');o.value=v;o.textContent='AppID '+v;e.target.insertBefore(o,e.target.lastElementChild);e.target.value=v;}
  appid=Number(v); window._brlRate=null; stashData=null; loadStash(); load(false);
});
$('refresh').addEventListener('click',()=>{
  if(cooldown) return;
  load(true); cooldown=60; const b=$('refresh');
  const iv=setInterval(()=>{cooldown--;b.disabled=cooldown>0;b.textContent=cooldown>0?`↻ ${cooldown}s`:'↻ Atualizar';if(!cooldown)clearInterval(iv);},1000);
  b.disabled=true;
});
loadStash(); load(false);
</script>
</body>
</html>
