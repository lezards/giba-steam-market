<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Giba Steam Market</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#121724; --panel2:#1a2133; --line:#232c44;
    --txt:#e8ecf6; --dim:#9aa7c7; --gold:#f6c945; --orange:#ff8a3d;
    --green:#4ade80; --blue:#60a5fa; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:15px/1.5 'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0e1320 0%,#0b0e14ee 100%);border-bottom:1px solid var(--line);padding:14px 22px;backdrop-filter:blur(8px)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  h1{font-size:19px;letter-spacing:.4px;background:linear-gradient(90deg,var(--orange),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  select,input,button{font:inherit;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:9px 13px;outline:none}
  select:focus,input:focus{border-color:var(--gold)}
  #search{flex:1;min-width:240px;font-size:16px}
  button{cursor:pointer;transition:.15s}
  button:hover{border-color:var(--gold);background:#222b45}
  button:disabled{opacity:.45;cursor:wait}
  .meta{color:var(--dim);font-size:13.5px}
  main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:18px 22px}
  table{width:100%;border-collapse:collapse}
  th{position:sticky;top:64px;background:var(--panel);text-align:left;padding:10px 12px;font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  th:hover{color:var(--gold)}
  td{padding:9px 12px;border-bottom:1px solid #161d30;vertical-align:middle}
  tr.item:hover{background:#141b2d}
  .rk{color:var(--dim);width:48px;font-size:13.5px}
  .ic{width:44px;height:44px;border-radius:8px;background:#0d1220;object-fit:contain}
  .nm{font-weight:600}
  .nm a{color:inherit;text-decoration:none}
  .nm a:hover{color:var(--gold)}
  .tp{font-size:13px;color:var(--dim)}
  .pr{font-weight:700;color:var(--green);white-space:nowrap;font-size:15.5px}
  .ls{color:var(--dim);white-space:nowrap}
  .brl{font-size:13.5px;padding:6px 11px}
  .brlv{color:var(--gold);font-weight:600;white-space:nowrap;font-size:14px}
  #status{padding:30px;text-align:center;color:var(--dim)}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-4px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  footer{border-top:1px solid var(--line);padding:14px 22px;text-align:center;color:var(--dim);font-size:13.5px}
  footer a{color:var(--orange);text-decoration:none}
  footer a:hover{color:var(--gold)}
  /* Baú */
  #stash{background:linear-gradient(180deg,#141a2b,#101524);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden}
  #stashHead{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;user-select:none;flex-wrap:wrap}
  #stashHead h2{font-size:15px;color:var(--gold);letter-spacing:.4px}
  .tot{margin-left:auto;display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  .tot b{font-size:21px;color:var(--green)}
  .tot .brlt{font-size:15px;color:var(--gold)}
  .tot .split{font-size:12.5px;color:var(--dim);width:100%}
  .tot .split b{font-size:12.5px;color:var(--blue)}
  .tot small{color:var(--dim);font-size:12px}
  .srow .kind{font-size:14px;width:20px;text-align:center;opacity:.85}
  #stashBody{border-top:1px solid var(--line);max-height:340px;overflow:auto}
  .srow{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid #161d30}
  .srow:last-child{border:0}
  .srow img{width:34px;height:34px;border-radius:6px;background:#0d1220;object-fit:contain}
  .srow .sn{flex:1;min-width:0}
  .srow .sn b{font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .sn small{color:var(--dim);font-size:12px}
  .qty{display:flex;align-items:center;gap:4px}
  .qty button{padding:3px 9px;border-radius:6px;font-size:15px;line-height:1}
  .qty span{min-width:26px;text-align:center;font-weight:600}
  .sval{color:var(--green);font-weight:700;min-width:78px;text-align:right;white-space:nowrap}
  .sval.muted{color:var(--dim);font-size:12px}
  .srm{color:var(--dim);background:none;border:none;cursor:pointer;font-size:17px;padding:2px 6px}
  .srm:hover{color:#ff6b6b}
  .add{background:none;border:1px solid var(--line);border-radius:7px;color:var(--gold);cursor:pointer;padding:4px 9px;font-size:15px;line-height:1}
  .add:hover{background:#222b45;border-color:var(--gold)}
  .empty{padding:16px;color:var(--dim);text-align:center;font-size:14px}
  /* Ordens de compra (venda imediata) */
  #ordBtn,#stashRefreshBtn,#scanBtn{background:#1a2238;border:1px solid var(--line);border-radius:8px;color:var(--gold);cursor:pointer;padding:7px 12px;font-size:13px;font-weight:600;white-space:nowrap}
  #ordBtn:hover,#stashRefreshBtn:hover,#scanBtn:hover{background:#232d4a;border-color:var(--gold)}
  #ordBtn:disabled,#stashRefreshBtn:disabled,#scanBtn:disabled{opacity:.6;cursor:wait}
  #scanBtn{border-color:#2a6f4a;color:#5fd39a}
  #scanBtn:hover{border-color:#5fd39a}
  #tabsBtn{background:#182036;border:1px solid var(--line);border-radius:8px;color:var(--dim);cursor:pointer;padding:7px 10px;font-size:12.5px;font-weight:600;white-space:nowrap}
  #tabsBtn:hover{color:var(--gold);border-color:var(--gold)}
  .tabsReport{margin-top:8px;display:flex;flex-direction:column;gap:6px}
  .tabBlock{background:#0d1220;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .tabBlock summary{cursor:pointer;color:var(--gold);font-size:13px;padding:2px 0}
  .tabGrid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .tabCell{background:#161d30;border:1px solid var(--line);border-radius:6px;padding:3px 7px;font-size:11.5px;color:#c7d0e0}
  .refTag{font-size:10px;color:#e8b84a;border:1px solid #6b561f;border-radius:5px;padding:0 5px;margin-left:6px}
  .scanbar{height:8px;background:#0e1422;border-radius:6px;overflow:hidden;margin:7px 0 3px}
  .scanfill{height:100%;background:linear-gradient(90deg,#2a6f4a,#5fd39a);transition:width .4s ease}
  #ordSummary{border-top:1px solid var(--line);padding:11px 16px;background:#0f1626;font-size:13px;color:var(--dim)}
  #ordSummary .obtot{display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  #ordSummary .obtot>b{color:var(--green);font-size:18px}
  #ordSummary .leg{font-size:11.5px}
  .slots4{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line);line-height:1.9}
  .slots4>b{color:var(--gold)}
  .slots4 .sl{display:inline-block;background:#161d30;border:1px solid var(--line);border-radius:7px;padding:3px 9px;margin:0 5px 3px 0}
  .slots4 .sl>b{color:var(--gold);font-size:12px}
  .slots4 .sl em{color:var(--green);font-style:normal;font-weight:700}
  .slots4 .sl small{color:var(--dim)}
  .ordsort{display:inline-flex;gap:5px;align-items:center;font-size:11.5px;color:var(--dim)}
  .ordsort button{background:#161d30;border:1px solid var(--line);border-radius:6px;color:var(--dim);cursor:pointer;padding:3px 9px;font-size:11.5px}
  .ordsort button:hover{border-color:var(--gold)}
  .ordsort button.on{background:var(--gold);color:#101524;border-color:var(--gold);font-weight:700}
  .ob{min-width:170px;text-align:right;white-space:nowrap;font-size:12.5px;line-height:1.5}
  .ob .obv{font-weight:700;color:var(--green)}
  .ob .obc{color:var(--dim);font-size:11px;display:block}
  .ob .obs{color:var(--blue);font-size:11px;display:block}
  .liq{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .liq-alta{background:#3ad17a;box-shadow:0 0 6px #3ad17a99}
  .liq-media{background:#e8c14a}
  .liq-baixa{background:#e8784a}
  .liq-nenhuma{background:#555}
  .srow.has-buy{background:linear-gradient(90deg,rgba(58,209,122,.07),transparent)}
  #diagBtn{background:#182036;border:1px solid var(--line);border-radius:8px;color:var(--dim);cursor:pointer;padding:7px 10px;font-size:12.5px;font-weight:600;white-space:nowrap}
  #diagBtn:hover{color:var(--gold);border-color:var(--gold)}
  .diagbox{padding:14px 16px;color:var(--dim);font-size:13px;line-height:1.55;text-align:left}
  .diagbox b{color:var(--txt)}
  .diagbox .ok{color:var(--green)}
  .diagbox .warn{color:#e8c14a}
  .diagbox .bad{color:#e8784a}
  .diagchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;justify-content:center}
  .diagchips span{border:1px solid var(--line);background:#111827;border-radius:7px;padding:3px 8px;color:var(--dim);font-size:12px}
  #diagPanel{border-top:1px solid var(--line);padding:12px 16px;background:#0f1626}
  #diagText{width:100%;min-height:150px;resize:vertical;background:#0b1020;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font:13px/1.45 Consolas,monospace}
  .diagHint{color:var(--dim);font-size:12px;margin-bottom:8px}
  @media(max-width:640px){ .tp,.ls{display:none} th:nth-child(5),td:nth-child(5){display:none} }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>⚔ Giba Steam Market</h1>
    <select id="game">
      <option value="3678970" selected>TBH: Task Bar Hero</option>
      <option value="730">Counter-Strike 2</option>
      <option value="440">Team Fortress 2</option>
      <option value="570">Dota 2</option>
      <option value="252490">Rust</option>
      <option value="custom">Outro appid…</option>
    </select>
    <input id="search" type="search" placeholder="Buscar item… (ex: Divine, Gloves, Helmet)" autofocus>
    <button id="refresh" title="Atualizar do Mercado Steam">↻ Atualizar</button>
  </div>
  <div class="row" style="margin-top:8px">
    <span class="meta" id="info">carregando…</span>
  </div>
</header>
<main>
  <section id="stash" hidden>
    <div id="stashHead">
      <h2>🎒 Meu Baú</h2>
      <span class="meta" id="stashCount"></span>
      <div class="tot">
        <span><small>valor estimado</small> <b id="totUsd">$0.00</b></span>
        <span class="brlt" id="totBrl"></span>
        <span class="split" id="totSplit"></span>
      </div>
      <button id="stashRefreshBtn" title="Reler o baú do save do jogo (depois de dropar ou vender algo)">↻ Atualizar Baú</button>
      <button id="scanBtn" title="Consulta CADA item do baú no Mercado Steam, um por um. Demora ~1 min, mas pega TUDO — inclusive itens sem anúncio de venda que têm comprador esperando.">🔎 Varredura Fiel (1 a 1)</button>
      <button id="ordBtn" title="Buscar as ordens de compra de cada item — quanto dá pra vender NA HORA">💸 Ver ordens de compra</button>
      <button id="tabsBtn" title="Ver o que o app leu em cada uma das 7 abas do baú, slot a slot, pra você comparar com o jogo">📑 Conferir abas</button>
      <button id="diagBtn" title="Copiar um diagnóstico seguro para pedir ajuda">📋 Diagnóstico</button>
      <span id="stashToggle" class="meta">▼</span>
    </div>
    <div id="ordSummary" hidden></div>
    <div id="diagPanel" hidden></div>
    <div id="stashBody"></div>
  </section>
  <div id="status"><span class="spin"></span>Buscando itens no Mercado Steam…</div>
  <table id="tbl" hidden>
    <thead><tr>
      <th class="rk">#</th><th></th><th data-s="name">Item</th>
      <th data-s="price">Preço (USD) ▼</th><th data-s="listings">À venda</th><th>BRL</th><th></th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</main>
<footer>EuSouOGiba · <a href="https://youtube.com/@eusouogiba" target="_blank">youtube.com/@eusouogiba</a> · <a href="https://eusouogiba.com" target="_blank">eusouogiba.com</a></footer>
<script>
let all=[], appid=3678970, sortKey='price', sortDir=-1, cooldown=0;
const $=id=>document.getElementById(id);
const norm=s=>s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
const byHash=h=>all.find(i=>i.hash===h);

// ===== Meu Baú — AUTO via save do jogo (TBH), manual pra outros =====
let stashData=null;   // resposta de /api/stash (TBH)
let stashError='';    // erro real da leitura automática, quando houver
let manual={};        // hash->qty (fallback manual / outros jogos)
const manKey=()=>`gsm_stash_${appid}`;
function loadStash(){ try{manual=JSON.parse(localStorage.getItem(manKey()))||{}}catch{manual={}} }
function saveStash(){ localStorage.setItem(manKey(),JSON.stringify(manual)); }
function setQty(h,q){ if(q<=0) delete manual[h]; else manual[h]=q; saveStash(); renderStash(); }
function addStash(h){ setQty(h,(manual[h]||0)+1); }

// ===== Ordens de compra (venda imediata) =====
let ordData=null;      // hash -> { maxBuyCents, minSellCents, buyCount, liquidez }  (null = ainda não buscado)
let ordSymbol='R$';
let ordSort='procura'; // 'procura' (mais compradores) | 'preco' (ordem de compra mais cara)
const liqLabel={alta:'vende rápido',media:'venda média',baixa:'pouca procura',nenhuma:'sem ordem'};
function centsBR(c){ return (c/100).toFixed(2).replace('.',','); }
function obCellHtml(o){
  if(!o) return '<span class="liq liq-nenhuma"></span><span class="obc">—</span>';
  if(o.error) return `<span class="obc" title="${o.error}">erro</span>`;
  const sell = o.minSellCents ? `<span class="obs" title="anúncio de venda mais barato">venda ${ordSymbol} ${centsBR(o.minSellCents)}</span>` : '';
  if(!o.maxBuyCents){
    // sem ordem de compra: não dá pra vender rápido, mas mostra a referência de venda
    return `<span class="liq liq-nenhuma" title="sem ordem de compra"></span><span class="obc">sem ordem de compra</span>${sell}`;
  }
  return `<span class="liq liq-${o.liquidez}" title="${liqLabel[o.liquidez]}"></span>`+
         `<span class="obv" title="maior ordem de compra — você vende NA HORA por isso">compra ${ordSymbol} ${centsBR(o.maxBuyCents)}</span>`+
         `<span class="obc">${o.buyCount} ${o.buyCount===1?'ordem':'ordens'} · ${liqLabel[o.liquidez]}</span>`+
         sell;
}
// monta o resumo (barra de destaque + total + toggle de ordenação)
function renderOrdSummary(tot, comOrdem, semOrdem, parcial){
  const sum=$('ordSummary'); if(!ordData) return; sum.hidden=false;
  const list=Object.values(ordData).filter(x=>x.maxBuyCents>0);
  const top = ordSort==='preco'
    ? list.slice().sort((a,b)=>b.maxBuyCents-a.maxBuyCents)
    : list.slice().sort((a,b)=>b.buyCount-a.buyCount);
  const four=top.slice(0,4);
  const titulo = ordSort==='preco' ? '💎 <b>Ordem de compra mais cara:</b>' : '⚡ <b>Vende na hora (mais procura):</b>';
  const fastHtml = four.length ? `<div class="slots4">${titulo}`
    + four.map(x=>`<span class="sl">${x.hash} <em>compra ${ordSymbol} ${centsBR(x.maxBuyCents)}</em> <small>(${x.buyCount} compradores)</small></span>`).join('')
    + `</div>` : '';
  const toggle = `<span class="ordsort">ordenar por:`
    + `<button data-sort="procura" class="${ordSort==='procura'?'on':''}">⚡ procura</button>`
    + `<button data-sort="preco" class="${ordSort==='preco'?'on':''}">💎 mais cara</button></span>`;
  sum.innerHTML=fastHtml
    +`<div class="obtot">💸 Vendendo TUDO que tem ordem de compra: <b>${ordSymbol} ${centsBR(tot)}</b>`
    +`<span class="leg">${comOrdem} com ordem · ${semOrdem} sem</span>`
    +toggle
    +`<span class="leg"><span class="liq liq-alta"></span>vende rápido (+500)&nbsp; <span class="liq liq-media"></span>média&nbsp; <span class="liq liq-baixa"></span>pouca&nbsp; <span class="liq liq-nenhuma"></span>sem ordem</span>`
    +(parcial?'<span class="leg" style="color:#e8784a">⚠️ Steam limitou; lista parcial, clique de novo em ~1min</span>':'')
    +`</div>`;
  sum._ctx={tot,comOrdem,semOrdem,parcial};
}

async function loadOrders(){
  const btn=$('ordBtn'); if(!stashData) return;
  btn.disabled=true; const old=btn.textContent; btn.textContent='⏳ buscando ordens…';
  try{
    const j=await(await fetch(`/api/stash-orders?appid=${appid}`)).json();
    if(j.items){
      ordData={}; for(const r of j.items) ordData[r.hash]=r;
      ordSymbol=j.symbol||'R$';
      const sum=$('ordSummary'); sum.hidden=false;
      const tot=j.totalImediatoCents||0;
      const semOrdem=j.items.filter(x=>!x.maxBuyCents&&!x.error).length;
      const parcial=j.items.some(x=>x.error==='rate-limited');
      const comOrdem=j.items.filter(x=>x.maxBuyCents>0).length;
      renderOrdSummary(tot, comOrdem, semOrdem, parcial);
    }
  }catch(e){ $('ordSummary').hidden=false; $('ordSummary').innerHTML='<span style="color:#e8784a">Não consegui buscar as ordens agora. Tente de novo.</span>'; }
  btn.disabled=false; btn.textContent=old;
  renderStash();
}

// ===== Varredura Fiel: consulta o orderbook de CADA item do baú (inclui os sem anúncio) =====
let scanning=false, scanResult=null;
async function runScan(){
  if(scanning || !stashData) return;
  scanning=true;
  const btn=$('scanBtn'); const old=btn.textContent; btn.disabled=true;
  const sum=$('ordSummary'); sum.hidden=false;
  const showProg=(d,t)=>{ const pct=t?Math.round(d/t*100):0;
    sum.innerHTML=`<div class="obtot">🔎 <b>Varredura Fiel em andamento…</b> consultando o Mercado Steam item a item.<div class="scanbar"><div class="scanfill" style="width:${pct}%"></div></div><span class="leg">${d} de ${t} itens · ${pct}% · pega até os que não têm anúncio de venda</span></div>`; };
  try{
    await fetch(`/api/stash-scan?action=start&appid=${appid}`);
    showProg(0,stashData.allEntries?stashData.allEntries.length:0);
    btn.textContent='🔎 varrendo…';
    let j;
    do{
      await new Promise(r=>setTimeout(r,2000));
      j=await(await fetch(`/api/stash-scan?action=status&appid=${appid}`)).json();
      if(j.status==='running') showProg(j.done,j.total);
    }while(j.status==='running');
    if(j.status==='done' && j.items){
      // popula o MESMO ordData usado pelo "Ver ordens de compra", mas agora com cobertura TOTAL
      ordData={}; for(const r of j.items) ordData[r.hash]=r;
      ordSymbol=j.symbol||'R$';
      scanResult=j; // guarda pro render do baú usar valores de venda na hora
      const tot=j.totalImediatoCents||0;
      const comOrdem=j.items.filter(x=>x.maxBuyCents>0).length;
      const semOrdem=j.items.filter(x=>!x.maxBuyCents&&!x.error).length;
      const parcial=j.items.some(x=>x.error==='rate-limited');
      renderOrdSummary(tot, comOrdem, semOrdem, parcial);
    }else if(j.status==='error'){
      sum.innerHTML='<span style="color:#e8784a">A varredura falhou: '+(j.error||'erro')+'. Tente de novo.</span>';
    }
  }catch(e){ sum.innerHTML='<span style="color:#e8784a">Não consegui varrer agora. Tente de novo.</span>'; }
  finally{ scanning=false; btn.disabled=false; btn.textContent=old; renderStash(); }
}

let lastSaveMtime=0;       // pro poll detectar drop/venda no jogo
let pricesResolving=false; // evita disparar o /api/stash-prices duas vezes

async function loadAutoStash(force){
  stashData=null; stashError=''; ordData=null; scanResult=null; $('ordSummary').hidden=true;
  $('diagPanel').hidden=true;
  try{
    const r=await fetch(`/api/stash?appid=${appid}${force?'&refresh=1':''}`);
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||r.status);
    if(j.supported) stashData=j;
    if(j&&j.saveMtime) lastSaveMtime=j.saveMtime;
  }catch(e){ stashError=e.message||'erro desconhecido'; }
  renderStash();
  // resolve sob demanda os preços pendentes (itens negociáveis cujo preço não veio no cache parcial)
  if(stashData && stashData.pendingItems>0) resolvePendingPrices();
}

// Busca os preços que faltam item a item (server controla o throttle) e atualiza o total AO VIVO.
// É o que impede itens negociáveis de "sumirem" quando a Steam entrega o cache de mercado parcial.
async function resolvePendingPrices(){
  if(pricesResolving) return; pricesResolving=true;
  const old=$('stashCount').textContent;
  $('stashCount').textContent='resolvendo preços do baú…';
  try{
    const r=await fetch(`/api/stash-prices?appid=${appid}`);
    const j=await r.json();
    if(r.ok && j.found){ stashData=j; renderStash(); }
  }catch(e){ /* mantém o que já tem; total parcial é melhor que sumir item */ }
  finally{ pricesResolving=false; if($('stashCount').textContent==='resolvendo preços do baú…') $('stashCount').textContent=old; }
}

// Poll leve: se o save mudou (Giba dropou/vendeu no jogo), re-lê o baú sozinho.
async function pollSaveMtime(){
  if(appid!==3678970) return;
  try{
    const j=await(await fetch('/api/save-mtime')).json();
    if(j.mtime && lastSaveMtime && j.mtime!==lastSaveMtime){ lastSaveMtime=j.mtime; loadAutoStash(true); }
    else if(j.mtime && !lastSaveMtime) lastSaveMtime=j.mtime;
  }catch{}
}
setInterval(pollSaveMtime, 15000);

function fmtUsd(c){ return '$'+((c||0)/100).toFixed(2); }
function sourceLabel(src){
  if(!src) return 'sem diagnóstico de fonte';
  const t = src.itemTable ? `${src.itemTable}/${src.itemTableCount||0}` : 'sem tabela';
  const n = src.itemNames ? `${src.itemNames}/${src.itemNamesCount||0}` : 'sem nomes';
  return `tabela ${t} · nomes ${n}`;
}
function diagChipsHtml(j){
  const src = j?.dataSources || {};
  return `<div class="diagchips">
    <span>${j?.totalItems||0} itens únicos lidos</span>
    <span>${j?.slotRefs||0} slots vistos</span>
    <span>${j?.duplicateSlotRefsIgnored||0} duplicados ignorados</span>
    <span>${j?.pricedItems||0} com preço</span>
    <span>${j?.pendingItems||0} carregando preço</span>
    <span>${j?.unlistedItems||0} sem anúncio</span>
    <span>${j?.unpricedItems||0} sem mercado</span>
    <span>tabela: ${src.itemTable||'?'}</span>
    <span>nomes: ${src.itemNames||'?'}</span>
  </div>`;
}
function diagnosticText(){
  const j=stashData;
  if(!j) return `Giba Steam Market\nappid=${appid}\nstatus=sem leitura automática\nerro=${stashError||'nenhum'}`;
  return [
    'Giba Steam Market - diagnostico seguro',
    `appid=${appid}`,
    `supported=${!!j.supported}`,
    `found=${!!j.found}`,
    `needItems=${!!j.needItems}`,
    `totalItems=${j.totalItems||0}`,
    `slotRefs=${j.slotRefs||0}`,
    `duplicateSlotRefsIgnored=${j.duplicateSlotRefsIgnored||0}`,
    `pricedItems=${j.pricedItems||0}`,
    `unlistedItems=${j.unlistedItems||0}`,
    `unpricedItems=${j.unpricedItems||0}`,
    `types=${j.types||0}`,
    `ownedGearItems=${j.ownedGearItems||0}`,
    `ownedMaterialItems=${j.ownedMaterialItems||0}`,
    `itemTable=${j.dataSources?.itemTable||'?'}/${j.dataSources?.itemTableCount||0}`,
    `itemNames=${j.dataSources?.itemNames||'?'}/${j.dataSources?.itemNamesCount||0}`,
    `error=${stashError||'nenhum'}`,
  ].join('\n');
}

function renderStash(){
  const sec=$('stash'), body=$('stashBody'); sec.hidden=false;
  // botão de ordens de compra só faz sentido no modo AUTO (baú do TBH lido)
  $('ordBtn').style.display = (stashData && stashData.items && stashData.items.length) ? '' : 'none';
  $('scanBtn').style.display = (stashData && stashData.allEntries && stashData.allEntries.length) ? '' : 'none';
  $('tabsBtn').style.display = (appid===3678970 && stashData && stashData.found) ? '' : 'none';
  $('diagBtn').style.display = (appid===3678970 || stashData || stashError) ? '' : 'none';
  // modo AUTO (save lido): usa stashData
  if(stashData){
    if(!stashData.found){
      body.innerHTML='<div class="diagbox"><b class="bad">Não achei o save do TBH neste Windows.</b><br>Abra o jogo uma vez para ele criar o save e depois clique em <b>Atualizar</b>. Se o jogo está instalado em outro usuário do Windows, rode o app no mesmo usuário.</div>';
      $('totUsd').textContent='$0.00'; $('totBrl').textContent=''; $('totSplit').innerHTML='';
      $('stashCount').textContent='save do TBH não encontrado';
      return;
    }
    if(stashData.needItems){
      body.innerHTML='<div class="diagbox"><b class="warn">Baú encontrado.</b><br>Agora estou esperando a lista de preços do Mercado Steam carregar. Deixe a janela preta aberta; quando o mercado terminar, clique em <b>Atualizar</b>.</div>';
      $('totUsd').textContent='$0.00'; $('totBrl').textContent=''; $('totSplit').innerHTML='';
      $('stashCount').textContent='save encontrado · aguardando preços do mercado';
      return;
    }
    // Quando as ordens já foram buscadas, reordena conforme o modo escolhido.
    // 'procura' = mais compradores primeiro (vende mais rápido).
    // 'preco'   = ordem de compra mais cara primeiro (maior retorno por unidade).
    // Em ambos, itens sem ordem de compra vão pro fim.
    let it=stashData.items;
    // Após a Varredura Fiel, mostra TAMBÉM os itens que não cruzavam com o cache (Diamond,
    // Amethyst, Turquoise...) — eles têm ordem de compra e antes sumiam da tela.
    if(scanResult && scanResult.items){
      const known=new Set(it.map(x=>x.hash.toLowerCase()));
      const extras=scanResult.items.filter(s=>!known.has((s.hash||'').toLowerCase()) && (s.maxBuyCents>0||s.qty>0))
        .map(s=>({ name:s.name, hash:s.hash, qty:s.qty, kind:s.kind, type:'', icon:'', color:'',
          priceCents:0, priceText:'', url:`https://steamcommunity.com/market/listings/${appid}/${encodeURIComponent(s.hash)}`,
          hasMarketListing:false, fromScan:true }));
      it=[...it, ...extras];
    }
    if(ordData){
      it=[...it].sort((a,b)=>{
        const oa=ordData[a.hash]||{}, ob=ordData[b.hash]||{};
        if(ordSort==='preco')
          return (ob.maxBuyCents||0)-(oa.maxBuyCents||0) || (ob.buyCount||0)-(oa.buyCount||0);
        return (ob.buyCount||0)-(oa.buyCount||0) || (ob.maxBuyCents||0)-(oa.maxBuyCents||0);
      });
    }
    body.innerHTML = it.length ? it.map(r=>{
      const tot=r.priceCents*r.qty;
      const ki=r.kind==='material'?'🔩':'⚔️';
      const noListing = r.hasMarketListing === false;
      const pending = r.pricePending === true;
      const o = ordData && ordData[r.hash];
      const hasBuy = o && o.maxBuyCents>0;
      // item vindo da Varredura Fiel (não cruzava com o cache): valor = ordem de compra
      const isRef = o && o.refPrice;
      const refMark = isRef ? ' <span class="refTag" title="O item do seu baú é de grade básica; este preço é de uma versão negociável do mesmo item — pode diferir do seu exato.">ref</span>' : '';
      const scanVal = r.fromScan && hasBuy ? `${ordSymbol} ${centsBR(o.maxBuyCents*r.qty)} na venda imediata${refMark}` : '';
      const priceNote = scanVal ? scanVal
        : noListing ? 'sem anúncio de venda · tente ordens de compra'
        : pending ? 'preço carregando…' : `${r.priceText} un.`;
      const obCell = ordData ? `<div class="ob">${ obCellHtml(o) }</div>` : '';
      return `<div class="srow${hasBuy?' has-buy':''}">
        <span class="kind" title="${r.kind==='material'?'material':'equipamento'}">${ki}</span>
        ${r.icon?`<img loading="lazy" src="${r.icon}">`:'<div style="width:34px"></div>'}
        <div class="sn"><b ${r.color?`style="color:#${r.color}"`:''}>${r.name}</b><small>${r.type} · ${priceNote}</small></div>
        <div class="qty" style="cursor:default"><span>×${r.qty}</span></div>
        <div class="sval${(noListing||pending)&&!hasBuy?' muted':''}">${r.fromScan?(hasBuy?ordSymbol+' '+centsBR(o.maxBuyCents*r.qty):'sem comprador'):noListing?'sem anúncio':pending?'⏳':'$'+(tot/100).toFixed(2)}</div>
        ${obCell}
        <a class="srm" href="${r.url}" target="_blank" title="Abrir na Steam" style="text-decoration:none">↗</a></div>`;
    }).join('') : `<div class="diagbox"><b class="${stashData.totalItems?'warn':'ok'}">Baú automático lido.</b><br>${stashData.totalItems
      ? 'Encontrei itens no save, mas nenhum deles entrou com preço/listagem agora. Isso pode acontecer se os itens não têm mercado, se o cache do mercado está incompleto ou se o jogo acabou de atualizar.'
      : 'O save foi encontrado, mas não há itens no baú/inventário para listar.'}<br><br><b>O que fazer:</b> clique em <b>Atualizar</b>. Se continuar assim, clique em <b>Diagnóstico</b> e envie o texto na issue do GitHub.${diagChipsHtml(stashData)}</div>`;
    $('totUsd').textContent=fmtUsd(stashData.totalCents);
    if(stashData.gearCents!=null){
      const extra = [
        stashData.unlistedItems ? `${stashData.unlistedItems} sem anúncio` : '',
        stashData.unpricedItems ? `${stashData.unpricedItems} sem mercado` : ''
      ].filter(Boolean).join(' · ');
      $('totSplit').innerHTML=`⚔️ equipamentos <b>${fmtUsd(stashData.gearCents)}</b> &nbsp;·&nbsp; 🔩 materiais <b>${fmtUsd(stashData.matCents)}</b>${extra?' &nbsp;·&nbsp; '+extra:''}`;
    }
    const bits = [`🔄 auto do save`, `${stashData.totalItems||0} itens lidos`, `${stashData.types||0} tipos na tela`, `${stashData.pricedItems||0} com preço`];
    if(stashData.pendingItems) bits.push(`⏳ ${stashData.pendingItems} carregando preço`);
    if(stashData.ownedGearItems!=null) bits.push(`⚔️ ${stashData.ownedGearItems} equips lidos`);
    if(stashData.unlistedItems) bits.push(`${stashData.unlistedItems} sem anúncio`);
    if(stashData.unpricedItems) bits.push(`${stashData.unpricedItems} sem mercado`);
    if(stashData.dataSources) bits.push(sourceLabel(stashData.dataSources));
    $('stashCount').textContent=bits.join(' · ');
    if(window._brlRate) $('totBrl').textContent='≈ R$ '+(stashData.totalCents/100*window._brlRate).toFixed(2).replace('.',',');
    return;
  }
  // modo MANUAL (outros jogos ou save não encontrado)
  $('totSplit').innerHTML='';
  const hashes=Object.keys(manual);
  if(stashError && appid===3678970){
    body.innerHTML=`<div class="empty" style="color:#e8784a">Não consegui ler o baú automático: ${stashError}. Se você acabou de atualizar o TBH, baixe a versão mais nova do app ou rode <code>npm run extract-tables</code>.</div>`;
    $('totUsd').textContent='$0.00'; $('totBrl').textContent=''; $('stashCount').textContent='erro na leitura automática — modo manual disponível';
    return;
  }
  if(!hashes.length){ body.innerHTML='<div class="empty">Baú vazio. Clique no ＋ de um item da lista pra calcular tua carteira manualmente.</div>'; $('totUsd').textContent='$0.00'; $('totBrl').textContent=''; $('stashCount').textContent=appid===3678970?'save do TBH não encontrado — modo manual':''; return; }
  let totC=0, known=0;
  const rows=hashes.map(h=>{const it=byHash(h),q=manual[h],c=it?it.priceCents:0; if(it){totC+=c*q;known++;} return {h,q,it,c};}).sort((a,b)=>(b.c*b.q)-(a.c*a.q));
  body.innerHTML=rows.map(r=>{
    const it=r.it,val=it?('$'+(r.c*r.q/100).toFixed(2)):'<small style="color:var(--dim)">sem preço</small>';
    return `<div class="srow" data-h="${encodeURIComponent(r.h)}">
      ${it&&it.icon?`<img loading="lazy" src="${it.icon}">`:'<div style="width:34px"></div>'}
      <div class="sn"><b ${it&&it.color?`style="color:#${it.color}"`:''}>${it?it.name:decodeURIComponent(r.h)}</b><small>${it?(it.priceText+' un.'):'item fora da lista'}</small></div>
      <div class="qty"><button data-a="dec">−</button><span>${r.q}</span><button data-a="inc">+</button></div>
      <div class="sval">${val}</div>
      <button class="srm" data-a="rm" title="Remover">✕</button></div>`;
  }).join('');
  $('totUsd').textContent='$'+(totC/100).toFixed(2);
  $('stashCount').textContent=`✏️ manual · ${hashes.length} tipos · ${hashes.reduce((s,h)=>s+manual[h],0)} itens`;
  if(window._brlRate) $('totBrl').textContent='≈ R$ '+(totC/100*window._brlRate).toFixed(2).replace('.',',');
}

$('stashBody').addEventListener('click',e=>{
  const b=e.target.closest('button[data-a]'); if(!b||stashData) return;
  const h=decodeURIComponent(e.target.closest('.srow').dataset.h);
  if(b.dataset.a==='inc') setQty(h,manual[h]+1);
  else if(b.dataset.a==='dec') setQty(h,manual[h]-1);
  else if(b.dataset.a==='rm') setQty(h,0);
});
$('stashHead').addEventListener('click',e=>{
  if(e.target.closest('button,a')) return;
  const body=$('stashBody'); const hide=body.style.display!=='none';
  body.style.display=hide?'none':''; $('stashToggle').textContent=hide?'▶':'▼';
});
$('stashRefreshBtn').addEventListener('click',async e=>{
  e.stopPropagation();
  const b=$('stashRefreshBtn'), old=b.textContent; b.disabled=true; b.textContent='↻ Lendo…';
  await loadAutoStash(true);
  b.disabled=false; b.textContent=old;
});
$('scanBtn').addEventListener('click',e=>{ e.stopPropagation(); runScan(); });
$('ordBtn').addEventListener('click',e=>{ e.stopPropagation(); loadOrders(); });
$('tabsBtn').addEventListener('click',async e=>{
  e.stopPropagation();
  const panel=$('diagPanel'); panel.hidden=false;
  panel.innerHTML='<div class="diagHint">Lendo as 7 abas do baú…</div>';
  try{
    const j=await(await fetch(`/api/stash-tabs?appid=${appid}`)).json();
    if(!j.found){ panel.innerHTML='<div class="diagHint">Save do TBH não encontrado.</div>'; return; }
    if(j.error){ panel.innerHTML='<div class="diagHint">Erro ao ler abas: '+j.error+'</div>'; return; }
    const esc=s=>String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    let html='<div class="diagHint">O que o app leu em cada aba do baú (7 abas × 49 slots). Compare com o jogo: se algum item que você vê não aparecer aqui, me avise o nome.</div>';
    html+='<div class="tabsReport">';
    for(const aba of j.tabs){
      html+=`<details class="tabBlock"><summary><b>${esc(aba.label)}</b> · ${aba.occupied} itens</summary><div class="tabGrid">`;
      html+=aba.slots.map(s=>`<span class="tabCell" title="slot ${s.cell+1}">${esc(s.name)}</span>`).join('');
      html+='</div></details>';
    }
    html+='</div>';
    panel.innerHTML=html;
  }catch(err){ panel.innerHTML='<div class="diagHint">Não consegui ler as abas agora. Tente de novo.</div>'; }
});
$('diagBtn').addEventListener('click',async e=>{
  e.stopPropagation();
  const txt=diagnosticText();
  const panel=$('diagPanel');
  panel.hidden=false;
  panel.innerHTML=`<div class="diagHint">Diagnóstico seguro para colar na issue do GitHub. Não contém save bruto nem nomes dos seus itens.</div><textarea id="diagText" readonly>${txt.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</textarea>`;
  setTimeout(()=>{ const ta=$('diagText'); ta.focus(); ta.select(); }, 0);
  try{
    await navigator.clipboard.writeText(txt);
    const old=$('diagBtn').textContent;
    $('diagBtn').textContent='✓ Copiado';
    setTimeout(()=>$('diagBtn').textContent=old,900);
  }catch{
    const old=$('diagBtn').textContent;
    $('diagBtn').textContent='Texto abaixo';
    setTimeout(()=>$('diagBtn').textContent=old,1200);
  }
});
$('ordSummary').addEventListener('click',e=>{
  const b=e.target.closest('button[data-sort]'); if(!b) return;
  ordSort=b.dataset.sort;
  const c=$('ordSummary')._ctx||{};
  renderOrdSummary(c.tot||0,c.comOrdem||0,c.semOrdem||0,c.parcial||false); // re-render barra/toggle
  renderStash();                                                          // re-ordena a lista
});
// taxa USD→BRL a partir do item mais caro do baú (1 req)
async function refreshBrlRate(){
  const pool = (stashData && stashData.items) ? stashData.items : Object.keys(manual).map(byHash).filter(Boolean);
  const h = pool.slice().sort((a,b)=>b.priceCents-a.priceCents)[0];
  if(!h) return;
  try{ const j=await(await fetch(`/api/price?appid=${appid}&name=${encodeURIComponent(h.hash)}`)).json();
    const brl=parseFloat((j.brl||'').replace(/[^\d,]/g,'').replace(',','.'));
    if(brl>0){ window._brlRate=brl/(h.priceCents/100); renderStash(); } }catch{}
}

async function load(force){
  $('status').hidden=false; $('tbl').hidden=true;
  $('status').innerHTML='<span class="spin"></span>Buscando itens no Mercado Steam…'+(force?' (atualização completa, ~15s por causa do rate-limit gentil)':'');
  try{
    const r=await fetch(`/api/items?appid=${appid}${force?'&refresh=1':''}`);
    if(!r.ok) throw new Error((await r.json()).error||r.status);
    const j=await r.json();
    all=j.items||[];
    await loadAutoStash(); refreshBrlRate();
    const age=Math.round((Date.now()-j.fetchedAt)/60000);
    $('info').textContent=`${j.total} itens · atualizado ${age<1?'agora':age+' min atrás'}${j.stale?' · atualizando em background…':''} · fonte: Mercado da Comunidade Steam (público)`;
    render();
  }catch(e){ $('status').textContent='Erro: '+e.message+' — tenta Atualizar de novo em 1 min.'; }
}

function render(){
  const q=norm($('search').value.trim());
  let list=q?all.filter(i=>norm(i.name).includes(q)||norm(i.type).includes(q)):all.slice();
  list.sort((a,b)=>{
    if(sortKey==='name') return sortDir*a.name.localeCompare(b.name);
    if(sortKey==='listings') return sortDir*(a.listings-b.listings);
    return sortDir*(a.priceCents-b.priceCents);
  });
  const tb=$('rows'); tb.innerHTML='';
  const frag=document.createDocumentFragment();
  list.forEach((i,n)=>{
    const tr=document.createElement('tr'); tr.className='item';
    tr.innerHTML=`<td class="rk">${n+1}</td>
      <td>${i.icon?`<img class="ic" loading="lazy" src="${i.icon}" alt="">`:''}</td>
      <td><div class="nm" ${i.color?`style="color:#${i.color}"`:''}><a href="${i.url}" target="_blank" title="Abrir listing na Steam">${i.name}</a></div><div class="tp">${i.type}</div></td>
      <td class="pr">${i.priceText}</td>
      <td class="ls">${i.listings}</td>
      <td><button class="brl" data-n="${encodeURIComponent(i.hash)}">R$ ?</button></td>
      <td><button class="add" data-h="${encodeURIComponent(i.hash)}" title="Adicionar ao Meu Baú">＋</button></td>`;
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
  $('status').hidden=list.length>0; $('tbl').hidden=list.length===0;
  if(!list.length) $('status').textContent='Nenhum item bate com "'+$('search').value+'"';
}

$('rows').addEventListener('click',async e=>{
  const ad=e.target.closest('.add');
  if(ad){ addStash(decodeURIComponent(ad.dataset.h)); ad.textContent='✓'; setTimeout(()=>ad.textContent='＋',700); if(!window._brlRate)refreshBrlRate(); return; }
  const b=e.target.closest('.brl'); if(!b) return;
  b.disabled=true; b.textContent='…';
  try{
    const r=await fetch(`/api/price?appid=${appid}&name=${b.dataset.n}`);
    const j=await r.json();
    if(j.error) throw new Error(j.error);
    b.outerHTML=`<span class="brlv">${j.brl||'—'}${j.volume?`<br><small style="color:var(--dim)">${j.volume}/dia</small>`:''}</span>`;
  }catch(err){ b.disabled=false; b.textContent='R$ ?'; b.title=err.message; }
});

let t; $('search').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(render,120)});
document.querySelectorAll('th[data-s]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.s; sortDir=(k===sortKey)?-sortDir:(k==='name'?1:-1); sortKey=k;
  document.querySelectorAll('th[data-s]').forEach(x=>x.textContent=x.textContent.replace(/ [▼▲]/,''));
  th.textContent+=sortDir<0?' ▼':' ▲'; render();
}));
$('game').addEventListener('change',e=>{
  let v=e.target.value;
  if(v==='custom'){ v=prompt('AppID do jogo (numérico):',''); if(!v||!/^\d+$/.test(v)){e.target.value=appid;return;}
    const o=document.createElement('option');o.value=v;o.textContent='AppID '+v;e.target.insertBefore(o,e.target.lastElementChild);e.target.value=v;}
  appid=Number(v); window._brlRate=null; stashData=null; loadStash(); load(false);
});
$('refresh').addEventListener('click',()=>{
  if(cooldown) return;
  load(true); cooldown=60; const b=$('refresh');
  const iv=setInterval(()=>{cooldown--;b.disabled=cooldown>0;b.textContent=cooldown>0?`↻ ${cooldown}s`:'↻ Atualizar';if(!cooldown)clearInterval(iv);},1000);
  b.disabled=true;
});
loadStash(); load(false);
</script>
